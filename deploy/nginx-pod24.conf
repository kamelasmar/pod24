# Pod24 Nginx server block.
#
# After certbot --nginx -d <domain> runs, certbot will inject SSL config
# automatically into this file (or create a parallel HTTPS server block).
# Until then, this serves over plain HTTP.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/pod24/public;
    index index.php;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Stripe webhook needs the raw body for signature verification — Nginx
    # passes it through; just make sure POSTs aren't accidentally rewritten.
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # Long-cache built Vite assets (filenames are hashed)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page 404 /index.php;
    error_log /var/log/nginx/pod24.error.log;
    access_log /var/log/nginx/pod24.access.log;
}
